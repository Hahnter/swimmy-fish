<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <meta name="theme-color" content="#021522" />
  <title>Starmie Breaker · Hahnter Arcade</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="assets/icon-192.png" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="shell">
    <header>
      <div>
        <h1>Starmie Breaker</h1>
        <p>MOVE mouse / touch / arrows. SPACE or tap to launch. P pauses.</p>
      </div>
      <nav class="top-actions">
        <a class="hub-link" href="../../index.html">← Arcade</a>
        <button id="muteBtn" aria-label="Toggle sound">Sound: On</button>
      </nav>
    </header>
    <canvas id="game" width="960" height="540" aria-label="Starmie Breaker game canvas"></canvas>
    <footer>Best score is saved locally. Part of the Hahnter Arcade hub.</footer>
  </div>
  <script src="game.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => navigator.serviceWorker.register('../../sw.js'));
    }
  </script>
</body>
</html>
